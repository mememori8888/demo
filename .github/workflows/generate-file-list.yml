name: UIに反映するファイルリスト作成　実行する必要なし

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'settings/**'
      - 'results/**'
  workflow_dispatch:

concurrency:
  group: generate-file-list
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            settings
            results
            docs/webapp
      
      - name: Generate file list JSON
        run: |
          echo "{" > docs/webapp/files.json
          echo '  "settings": [' >> docs/webapp/files.json
          
          first=true
          for file in settings/*.csv; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              if [ "$first" = true ]; then
                echo -n "    \"$filename\"" >> docs/webapp/files.json
                first=false
              else
                echo "," >> docs/webapp/files.json
                echo -n "    \"$filename\"" >> docs/webapp/files.json
              fi
            fi
          done
          
          echo "" >> docs/webapp/files.json
          echo '  ],' >> docs/webapp/files.json
          echo '  "results": [' >> docs/webapp/files.json
          
          first=true
          for file in results/*.csv; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              if [ "$first" = true ]; then
                echo -n "    \"$filename\"" >> docs/webapp/files.json
                first=false
              else
                echo "," >> docs/webapp/files.json
                echo -n "    \"$filename\"" >> docs/webapp/files.json
              fi
            fi
          done
          
          echo "" >> docs/webapp/files.json
          echo '  ]' >> docs/webapp/files.json
          echo "}" >> docs/webapp/files.json
          
          cat docs/webapp/files.json
      
      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/webapp/files.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Update file list [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
