name: BrightData dental new reviews parallel batches

on:
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'Input CSV file'
        required: true
        default: 'results/dental_new_hokkaido.csv'
      output_file:
        description: 'Merged review output CSV'
        required: true
        default: 'results/dental_new_reviews_hokkaido.csv'
      merge_to_all_regions:
        description: 'Merge output into all_regions_file'
        required: false
        default: true
        type: boolean
      all_regions_file:
        description: 'All regions review CSV'
        required: false
        default: 'results/dental_new_reviews_all_regions.csv'
      days_back:
        description: 'Days back'
        required: true
        default: '10'
      start_from_batch:
        description: 'Start from batch number'
        required: false
        default: '1'
      rows_per_batch:
        description: 'Rows per batch'
        required: false
        default: '500'
      max_batches:
        description: 'Maximum number of batches to run from start_from_batch (0 = all)'
        required: false
        default: '0'
      api_batch_size:
        description: 'API batch size'
        required: false
        default: '50'
      max_parallel_jobs:
        description: 'Maximum parallel Docker batches'
        required: false
        default: '3'
      max_wait_minutes:
        description: 'Snapshot wait minutes'
        required: false
        default: '90'
      dataset_id:
        description: 'BrightData Dataset ID'
        required: false
        default: 'gd_luzfs1dn2oa0teb81'
      skip_column:
        description: 'Skip rows when this column is empty'
        required: false
        default: 'web'
      generate_report:
        description: 'Generate report'
        required: true
        default: true
        type: boolean
      report_days:
        description: 'Report days'
        required: false
        default: '10'

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      total_rows: ${{ steps.plan.outputs.total_rows }}
      total_batches: ${{ steps.plan.outputs.total_batches }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mememori8888/googlemap
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-data
          sparse-checkout: |
            settings
            results
      - name: Copy private data
        run: |
          cp -r private-data/settings ./settings
          cp -r private-data/results ./results
      - name: Build dynamic matrix
        id: plan
        env:
          CSV_FILE: ${{ inputs.csv_file }}
          ROWS_PER_BATCH: ${{ inputs.rows_per_batch }}
          START_FROM_BATCH: ${{ inputs.start_from_batch }}
          MAX_BATCHES: ${{ inputs.max_batches }}
          MAX_PARALLEL_JOBS: ${{ inputs.max_parallel_jobs }}
        run: |
          python - <<'PY'
          import json, math, os
          from pathlib import Path
          csv_file = Path(os.environ["CSV_FILE"])
          rows_per_batch = int(os.environ["ROWS_PER_BATCH"])
          start_from_batch = int(os.environ["START_FROM_BATCH"])
          max_batches = int(os.environ["MAX_BATCHES"])
          max_parallel_jobs = int(os.environ["MAX_PARALLEL_JOBS"])
          if rows_per_batch < 1 or start_from_batch < 1:
              raise SystemExit("rows_per_batch and start_from_batch must be greater than 0")
          if max_batches < 0:
              raise SystemExit("max_batches must be 0 or greater")
          if not 1 <= max_parallel_jobs <= 3:
              raise SystemExit("max_parallel_jobs must be between 1 and 3")
          if not csv_file.exists():
              raise SystemExit(f"CSV file not found: {csv_file}")
          total_rows = max(sum(1 for _ in csv_file.open("r", encoding="utf-8-sig", errors="ignore")) - 1, 0)
          total_batches = math.ceil(total_rows / rows_per_batch) if total_rows else 0
          include = []
          for batch in range(start_from_batch, total_batches + 1):
              start_row = (batch - 1) * rows_per_batch + 1
              end_row = min(batch * rows_per_batch, total_rows)
              include.append({"batch_number": batch, "start_row": start_row, "end_row": end_row})
              if max_batches and len(include) >= max_batches:
                  break
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}\n")
              out.write(f"total_rows={total_rows}\n")
              out.write(f"total_batches={total_batches}\n")
          print(f"total_rows={total_rows}, total_batches={total_batches}, selected_batches={len(include)}")
          PY

  run-batches:
    needs: prepare
    if: needs.prepare.outputs.total_batches != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel_jobs) }}
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mememori8888/googlemap
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-data
          sparse-checkout: |
            settings
            results
      - name: Copy private data
        run: |
          cp -r private-data/settings ./settings
          cp -r private-data/results ./results
          mkdir -p results/dental_new_parallel results/logs results/errors
      - name: Run Docker batch
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          ZONE_NAME: ${{ secrets.BRIGHTDATA_ZONE_NAME || 'serp_api2' }}
        run: |
          set -o pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            -e BRIGHTDATA_API_TOKEN \
            -e ZONE_NAME \
            -e INPUT_CSV="${{ inputs.csv_file }}" \
            -e OUTPUT_CSV="results/dental_new_parallel/output_batch_${{ matrix.batch_number }}.csv" \
            -e UPDATE_CSV="results/dental_new_parallel/dental_new_reviews_batch_${{ matrix.batch_number }}.csv" \
            -e START_ROW="${{ matrix.start_row }}" \
            -e END_ROW="${{ matrix.end_row }}" \
            -e DAYS_BACK="${{ inputs.days_back }}" \
            -e BATCH_SIZE="${{ inputs.api_batch_size }}" \
            -e MAX_WAIT_MINUTES="${{ inputs.max_wait_minutes }}" \
            -e BRIGHTDATA_DATASET_ID="${{ inputs.dataset_id }}" \
            -e SKIP_COLUMN="${{ inputs.skip_column }}" \
            python:3.12-slim \
            sh -lc '
              set -eu
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              python get_reviews_from_dental_new.py
            ' 2>&1 | tee "results/logs/dental_new_batch_${{ matrix.batch_number }}.log"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dental-new-reviews-batch-${{ matrix.batch_number }}
          path: |
            results/dental_new_parallel/*.csv
            results/logs/dental_new_batch_${{ matrix.batch_number }}.log
          if-no-files-found: warn
          retention-days: 7

  merge-results:
    needs: [prepare, run-batches]
    # フェイルセーフ: 一部バッチが失敗しても、成功した分の取得済みデータは失わずマージする
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.total_batches != '0' &&
      needs.run-batches.result != 'cancelled' &&
      needs.run-batches.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: mememori8888/googlemap
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-data
          sparse-checkout: |
            settings
            results
      - name: Copy private data
        run: |
          cp -r private-data/settings ./settings
          cp -r private-data/results ./results
      - uses: actions/download-artifact@v4
        with:
          pattern: dental-new-reviews-batch-*
          path: downloaded-batches
          merge-multiple: true
      - name: Merge batch CSVs
        env:
          OUTPUT_FILE: ${{ inputs.output_file }}
          ALL_REGIONS_FILE: ${{ inputs.all_regions_file }}
          MERGE_TO_ALL_REGIONS: ${{ inputs.merge_to_all_regions }}
          INCREMENT_FILE: results/increments/dental_new_reviews_increment_${{ github.run_id }}.csv
        run: |
          BATCH_PATTERN='downloaded-batches/**/dental_new_reviews_batch_*.csv' python scripts/merge_review_batches.py
      - name: Save to private data repository
        run: |
          mkdir -p "private-data/$(dirname '${{ inputs.output_file }}')"
          cp "${{ inputs.output_file }}" "private-data/${{ inputs.output_file }}"
          if [ "${{ inputs.merge_to_all_regions }}" = "true" ] && [ -f "${{ inputs.all_regions_file }}" ]; then
            mkdir -p "private-data/$(dirname '${{ inputs.all_regions_file }}')"
            cp "${{ inputs.all_regions_file }}" "private-data/${{ inputs.all_regions_file }}"
          fi
          if [ -f "results/increments/dental_new_reviews_increment_${{ github.run_id }}.csv" ]; then
            mkdir -p "private-data/results/increments"
            cp "results/increments/dental_new_reviews_increment_${{ github.run_id }}.csv" "private-data/results/increments/"
          fi
          cd private-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add results/
          git diff --staged --quiet || (git commit -m "Update dental new parallel review batches - $(date +'%Y-%m-%d %H:%M:%S')" && git pull --rebase origin main && git push)
      - name: Summary
        run: |
          echo "## Parallel dental new review batches" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total rows: ${{ needs.prepare.outputs.total_rows }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total batches: ${{ needs.prepare.outputs.total_batches }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Max parallel jobs: ${{ inputs.max_parallel_jobs }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- run-batches result: ${{ needs.run-batches.result }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.run-batches.result }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ 一部バッチが失敗しましたが、成功したバッチのデータはマージ済みです。Actionsの実行一覧で失敗バッチ(赤い✗)の start_row/end_row を確認し、start_from_batch を指定して再実行してください。" >> "$GITHUB_STEP_SUMMARY"
          fi
