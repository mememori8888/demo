name: TEMP SERP API diagnostic test 4

on:
  push:
    paths:
      - '.github/workflows/_tmp_serp_test4.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Call BrightData Google Reviews endpoint with hex fid
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          FID: '0x6000e2cfeb9f9daf:0x8eb9dda76a18ba2f'
        run: |
          python3 -c "
          import requests, json

          url = 'https://api.brightdata.com/request'
          fid = '$FID'
          headers = {
              'Authorization': 'Bearer ' + '$BRIGHTDATA_API_TOKEN',
              'Content-Type': 'application/json'
          }

          def show(label, payload):
              print('=====', label, '=====')
              print('payload url:', payload['url'])
              response = requests.post(url, json=payload, headers=headers, timeout=60)
              print('HTTP status:', response.status_code)
              text = response.text
              print('raw length:', len(text))
              print('raw full:', text[:4000])
              try:
                  data = response.json()
                  body = data.get('body') if isinstance(data, dict) else data
                  if isinstance(body, str):
                      try:
                          body = json.loads(body)
                      except Exception as e:
                          print('body json.loads failed:', e)
                  if isinstance(body, dict):
                      print('body top-level keys:', list(body.keys()))
                      reviews = body.get('reviews') or body.get('review_results')
                      print('reviews type:', type(reviews))
                      if isinstance(reviews, list):
                          print('reviews count:', len(reviews))
                          if reviews:
                              print('first review full:', json.dumps(reviews[0], ensure_ascii=False)[:2000])
                  else:
                      print('body type:', type(body), 'value head:', str(body)[:500])
              except Exception as e:
                  print('overall parse failed:', e)
              print()

          reviews_url = f'https://www.google.com/reviews?fid={fid}&hl=ja&sort=qualityScore&brd_json=1'
          show('Google Reviews endpoint (fid=hex, brd_json=1)', {
              'zone': 'serp_api2',
              'url': reviews_url,
              'format': 'json',
              'data_format': 'parsed',
              'method': 'GET'
          })

          reviews_url2 = f'https://www.google.com/reviews?fid={fid}&hl=ja&sort=newestFirst&brd_json=1'
          show('Google Reviews endpoint (fid=hex, sort=newestFirst)', {
              'zone': 'serp_api2',
              'url': reviews_url2,
              'format': 'json'
          })
          "
