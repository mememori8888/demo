name: URL>fid

on:
  workflow_dispatch:
    inputs:
      input_file_choice:
        description: '入力ファイルの選択方法'
        required: true
        type: choice
        options:
          - '📁 resultsフォルダから選択'
          - '✍️ ファイル名を直接入力'
        default: '📁 resultsフォルダから選択'
      input_file:
        description: '入力CSVファイル名（funeral.csv, dental.csv, fid.csv など）'
        required: true
        type: string
        default: 'funeral.csv'
      output_file_choice:
        description: '出力ファイルの選択方法'
        required: true
        type: choice
        options:
          - '📝 新規ファイル名を入力'
          - '📁 既存ファイルから選択'
        default: '📝 新規ファイル名を入力'
      output_file_name:
        description: '新規ファイル名（英数字とアンダースコアのみ。拡張子不要）'
        required: false
        type: string
        default: 'extracted_fid'
      output_file_existing:
        description: '既存ファイル名（results/*.csv）- 既存ファイルから選択した場合のみ使用'
        required: false
        type: string
        default: ''
      delay:
        description: '各リクエスト間の待機時間（秒）'
        required: false
        default: 2
        type: number
      workers:
        description: '並列実行数（デフォルト: 4）'
        required: false
        default: 4
        type: number
      limit:
        description: 'テスト用: 処理する最大件数（空欄で全件処理）'
        required: false
        type: number
  workflow_call:
    inputs:
      input_file_choice:
        description: '入力ファイルの選択方法'
        required: true
        type: string
        default: '✍️ ファイル名を直接入力'
      input_file:
        description: '入力CSVファイル名'
        required: true
        type: string
      output_file_choice:
        description: '出力ファイルの選択方法'
        required: true
        type: string
        default: '📝 新規ファイル名を入力'
      output_file_name:
        description: '新規ファイル名'
        required: false
        type: string
      output_file_existing:
        description: '既存ファイル名'
        required: false
        type: string
      delay:
        description: '待機時間'
        required: false
        type: string
        default: '2'
      workers:
        description: '並列実行数'
        required: false
        type: string
        default: '4'
      limit:
        description: '最大件数'
        required: false
        type: string

jobs:
  extract-fid:
    runs-on: ubuntu-latest
    
    steps:
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v4
    
    - name: Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 依存関係のインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Chrome と ChromeDriver のセットアップ
      run: |
        # Chromeのインストール（最新版）
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        # ChromeDriverのインストール（Chromeのバージョンに合わせる）
        CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d '.' -f 1)
        echo "Chrome major version: $CHROME_VERSION"
        
        # ChromeDriver JSONエンドポイントから最新の互換バージョンを取得
        CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION}")
        echo "ChromeDriver version: $CHROMEDRIVER_VERSION"
        
        # ChromeDriverをダウンロードして配置
        wget -q "https://storage.googleapis.com/chrome-for-testing-public/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
        unzip -q chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver
        rm -rf chromedriver-linux64.zip chromedriver-linux64
    
    - name: Chrome と ChromeDriver のバージョン確認
      run: |
        echo "Chrome version:"
        google-chrome --version
        echo "ChromeDriver version:"
        chromedriver --version
    
    - name: 入力ファイルの検証と準備
      id: prepare
      run: |
        echo "📋 入力ファイルの検証中..."
        
        # 入力ファイルの検証
        INPUT_FILE="${{ inputs.input_file }}"
        # results/ プレフィックスがあれば削除
        INPUT_FILE="${INPUT_FILE#results/}"
        
        if [ ! -f "results/$INPUT_FILE" ]; then
          echo "❌ エラー: 入力ファイル 'results/$INPUT_FILE' が見つかりません"
          echo "利用可能なファイル:"
          ls -1 results/*.csv 2>/dev/null || echo "  (CSVファイルがありません)"
          exit 1
        fi
        echo "✓ 入力ファイル: results/$INPUT_FILE"
        
        # 出力ファイル名の決定と検証
        if [ "${{ inputs.output_file_choice }}" = "📝 新規ファイル名を入力" ]; then
          OUTPUT_NAME="${{ inputs.output_file_name }}"
          
          if [ -z "$OUTPUT_NAME" ]; then
            echo "❌ エラー: 新規ファイル名を入力してください"
            exit 1
          fi
          
          # 拡張子が入力された場合は削除
          OUTPUT_NAME="${OUTPUT_NAME%.csv}"

          # ファイル名の検証（アルファベット、数字、アンダースコア、ハイフン）
          if ! echo "$OUTPUT_NAME" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "❌ エラー: 出力ファイル名は英数字、アンダースコア、ハイフンのみ使用できます"
            echo "指定されたファイル名: $OUTPUT_NAME"
            exit 1
          fi
          
          OUTPUT_FILE="${OUTPUT_NAME}.csv"
          
          if [ -f "results/$OUTPUT_FILE" ]; then
            echo "⚠️  警告: 既存ファイル 'results/$OUTPUT_FILE' を上書きします"
          else
            echo "✓ 新規ファイルを作成: results/$OUTPUT_FILE"
          fi
        else
          OUTPUT_FILE="${{ inputs.output_file_existing }}"
          # results/ プレフィックスがあれば削除
          OUTPUT_FILE="${OUTPUT_FILE#results/}"
          
          if [ -z "$OUTPUT_FILE" ]; then
            echo "❌ エラー: 既存ファイルを選択してください"
            echo "利用可能なファイル:"
            ls -1 results/*.csv 2>/dev/null || echo "  (CSVファイルがありません)"
            exit 1
          fi
          
          # 既存ファイルの確認（警告のみ、実行は継続）
          if [ -f "results/$OUTPUT_FILE" ]; then
            echo "⚠️  警告: 既存ファイル 'results/$OUTPUT_FILE' を上書きします"
          else
            echo "✓ 新規ファイルとして作成: results/$OUTPUT_FILE"
          fi
        fi
        
        # 環境変数に設定
        echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
        echo "input_file=$INPUT_FILE" >> $GITHUB_OUTPUT
        
        echo ""
        echo "🚀 処理を開始します"
        echo "  入力: results/$INPUT_FILE"
        echo "  出力: results/$OUTPUT_FILE"
    
    - name: FID抽出処理の実行
      run: |
        python extract_fid_from_urls.py \
          --input "results/${{ steps.prepare.outputs.input_file }}" \
          --output "results/${{ steps.prepare.outputs.output_file }}" \
          --delay ${{ inputs.delay }} \
          --workers ${{ inputs.workers }} \
          ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }}
    
    - name: 実行結果のアップロード
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: extracted-fid-results
        path: results/${{ steps.prepare.outputs.output_file }}
        retention-days: 30
    
    - name: ログのアップロード
      uses: actions/upload-artifact@v4
      if: always() && hashFiles('logs/*.log') != ''
      with:
        name: extraction-logs
        path: logs/*.log
        retention-days: 7
        if-no-files-found: ignore
    
    - name: Update file list
      if: always()
      run: |
        echo "Updating files.json..."
        echo "{" > docs/webapp/files.json
        echo '  "settings": [' >> docs/webapp/files.json
        
        first=true
        for file in settings/*.csv; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            if [ "$first" = true ]; then
              echo -n "    \"$filename\"" >> docs/webapp/files.json
              first=false
            else
              echo "," >> docs/webapp/files.json
              echo -n "    \"$filename\"" >> docs/webapp/files.json
            fi
          fi
        done
        
        echo "" >> docs/webapp/files.json
        echo '  ],' >> docs/webapp/files.json
        echo '  "results": [' >> docs/webapp/files.json
        
        first=true
        for file in results/*.csv; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            if [ "$first" = true ]; then
              echo -n "    \"$filename\"" >> docs/webapp/files.json
              first=false
            else
              echo "," >> docs/webapp/files.json
              echo -n "    \"$filename\"" >> docs/webapp/files.json
            fi
          fi
        done
        
        echo "" >> docs/webapp/files.json
        echo '  ]' >> docs/webapp/files.json
        echo "}" >> docs/webapp/files.json
        
        echo "✅ files.json updated"
        cat docs/webapp/files.json

    - name: Commit and push results
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        OUTPUT_FILE="results/${{ steps.prepare.outputs.output_file }}"
        
        if [ -f "$OUTPUT_FILE" ]; then
          git add "$OUTPUT_FILE" docs/webapp/files.json
          
          # 変更がある場合のみコミット
          if ! git diff --staged --quiet; then
            git commit -m "Add extracted FID data: ${{ steps.prepare.outputs.output_file }} - $(date +'%Y-%m-%d %H:%M:%S')"
            
            # リトライ付きでpush（最大3回）
            for i in {1..3}; do
              echo "Push attempt $i/3..."
              
              # リモートの変更を取得してマージ
              git pull --rebase origin main || true
              
              if git push origin main; then
                echo "✅ Push succeeded"
                break
              else
                echo "❌ Push failed (attempt $i/3)"
                if [ $i -eq 3 ]; then
                  echo "⚠️ Push failed after 3 attempts, but results are uploaded as artifacts"
                else
                  echo "⏳ Waiting 5 seconds before retry..."
                  sleep 5
                fi
              fi
            done
          else
            echo "No changes to commit"
          fi
        else
          echo "Output file not found, skipping commit"
        fi

    - name: 処理結果サマリー
      if: always()
      run: |
        OUTPUT_FILE="results/${{ steps.prepare.outputs.output_file }}"
        
        if [ -f "$OUTPUT_FILE" ]; then
          echo "✅ FID抽出が完了しました"
          echo ""
          echo "📊 処理結果:"
          echo "  入力ファイル: results/${{ steps.prepare.outputs.input_file }}"
          echo "  出力ファイル: $OUTPUT_FILE"
          echo "  抽出件数: $(( $(wc -l < "$OUTPUT_FILE") - 1 ))件"
          echo ""
          echo "--- 先頭5件のプレビュー ---"
          head -6 "$OUTPUT_FILE"
          echo ""
          echo "💾 ダウンロード方法:"
          echo "  1. 上記の 'Artifacts' セクションから 'extracted-fid-results' をクリック"
          echo "  2. ZIPファイルをダウンロードして解凍"
        else
          echo "❌ FID抽出に失敗しました"
          echo ""
          echo "🔍 トラブルシューティング:"
          echo "  - 入力ファイルにGoogleマップURLが含まれているか確認"
          echo "  - ログを確認してエラー内容を確認"
        fi
