name: TEMP SERP API diagnostic test 3

on:
  push:
    paths:
      - '.github/workflows/_tmp_serp_test3.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Call BrightData SERP API with full canonical maps URL
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          ZONE: serp_api2
          FULL_URL: 'https://www.google.com/maps/place/%E5%8C%BB%E7%99%82%E6%B3%95%E4%BA%BA%E7%A4%BE%E5%9B%A3+%E8%8F%8A%E7%94%B0%E6%AD%AF%E7%A7%91%E3%82%AF%E3%83%AA%E3%83%8B%E3%83%83%E3%82%AF/@41.8172129,140.7416055,17z/data=!4m8!3m7!1s0x5f9ef701da32a885:0x4997e35492a49d17!8m2!3d41.8172129!4d140.7416055!9m1!1b1!16s%2Fg%2F11t6thpxly?entry=ttu&g_ep=EgoyMDI2MDcwOC4wIKXMDSoASAFQAw%3D%3D'
        run: |
          echo "--- request D: full canonical URL + brd_json=1 ---"
          curl -sS -X POST https://api.brightdata.com/request \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BRIGHTDATA_API_TOKEN" \
            -d "{\"zone\": \"$ZONE\", \"url\": \"${FULL_URL}&brd_json=1\", \"format\": \"json\"}" \
            -o /tmp/response_d.json
          echo "size: $(wc -c < /tmp/response_d.json) bytes"
          python3 -c "
          import json
          with open('/tmp/response_d.json') as f:
              data = json.load(f)
          body = data.get('body')
          if isinstance(body, str):
              body = json.loads(body)
          print('top-level keys:', list(body.keys()) if isinstance(body, dict) else type(body))
          if isinstance(body, dict):
              place = body.get('place') or {}
              print('place keys:', list(place.keys()) if isinstance(place, dict) else type(place))
              reviews = body.get('reviews') or (place.get('reviews') if isinstance(place, dict) else None)
              print('reviews field type:', type(reviews))
              if isinstance(reviews, list):
                  print('reviews count:', len(reviews))
                  print('first review:', json.dumps(reviews[0], ensure_ascii=False)[:1500] if reviews else None)
              else:
                  print('reviews raw value:', str(reviews)[:500])
          "
          echo "--- request E: full canonical URL, format=raw (see if HTML/redirect) ---"
          curl -sS -w "\nHTTP_STATUS:%{http_code}\n" -X POST https://api.brightdata.com/request \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BRIGHTDATA_API_TOKEN" \
            -d "{\"zone\": \"$ZONE\", \"url\": \"${FULL_URL}\", \"format\": \"raw\"}" \
            | head -c 800
          echo ""
