name: オーケストレーション

permissions:
  contents: write
  issues: write

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  parse-and-route:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && (
        contains(github.event.issue.body, '/run-reviews-sequential') ||
        contains(github.event.issue.body, '/run-reviews-auto-batch') ||
        contains(github.event.issue.body, '/run-reviews') ||
        contains(github.event.issue.body, '/run-facility')
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/承認'))
    
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      workflow_type: ${{ steps.parse.outputs.workflow_type }}
      params: ${{ steps.parse.outputs.params }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check authorization
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        run: |
          if [[ "$EVENT_NAME" == "issues" ]]; then
            echo "should_run=preview" >> $GITHUB_OUTPUT
            echo "✅ Issue created - preview mode"
            exit 0
          fi
          
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            if [[ "$COMMENT_BODY" == *"/承認"* ]]; then
              AUTHOR="$COMMENT_USER"
              if [[ "$AUTHOR" == "mememori8888" ]] || [[ "$COMMENT_AUTHOR_ASSOC" == "OWNER" ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "✅ Approved by: $AUTHOR"
              else
                echo "should_run=false" >> $GITHUB_OUTPUT
                echo "❌ Unauthorized user: $AUTHOR"
              fi
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Notify unauthorized approval attempt
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/承認') && steps.check.outputs.should_run == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.payload.comment?.user?.login || 'unknown';
            const association = context.payload.comment?.author_association || 'UNKNOWN';

            const body = [
              '⚠️ 実行は開始されませんでした。',
              '',
              '理由: `/承認` の実行権限がありません。',
              `- 実行ユーザー: ${actor}`,
              `- 権限: ${association}`,
              '',
              '管理者（OWNER）が `/承認` をコメントすると実行できます。'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
      
      - name: Parse issue body
        id: parse
        if: steps.check.outputs.should_run != 'false'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # ワークフロータイプを検出
          if echo "$ISSUE_BODY" | grep -q "/run-reviews-sequential"; then
            WORKFLOW="reviews_sequential"
          elif echo "$ISSUE_BODY" | grep -q "/run-reviews-auto-batch"; then
            WORKFLOW="reviews_auto_batch"
          elif echo "$ISSUE_BODY" | grep -q "/run-reviews"; then
            WORKFLOW="reviews"
          elif echo "$ISSUE_BODY" | grep -q "/run-facility"; then
            WORKFLOW="facility"
          fi
          
          echo "workflow_type=$WORKFLOW" >> $GITHUB_OUTPUT
          echo "Detected workflow: $WORKFLOW"
          
          # JSONパラメータを抽出
          JSON_BLOCK=$(echo "$ISSUE_BODY" | sed -n '/```json/,/```/p' | sed '1d;$d')
          echo "params<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON_BLOCK" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Estimate Cost
        id: estimate
        if: steps.check.outputs.should_run == 'preview'
        env:
          WORKFLOW: ${{ steps.parse.outputs.workflow_type }}
          PARAMS: ${{ steps.parse.outputs.params }}
        run: |
          python3 -c '
          import os, json, sys

          workflow = os.environ.get("WORKFLOW", "")
          params_json = os.environ.get("PARAMS", "{}")
          try:
              params = json.loads(params_json)
          except:
              params = {}

          # データはプライベートリポジトリにあるため行数カウントは省略
          # パラメータから直接見積もる
          requests = 0
          details = "Calculation failed"

          try:
              if workflow == "reviews_auto_batch":
                batch_size = params.get("batch_size")
                max_parallel = params.get("max_parallel_jobs")
                if batch_size and str(batch_size).isdigit():
                  n = int(batch_size)
                  parallel = int(max_parallel) if max_parallel and str(max_parallel).isdigit() else 1
                  requests = n * parallel * 5
                  details = f"{n} per batch * {parallel} batches * 5 reqs"
                else:
                  details = "batch_size is missing or invalid"

              elif workflow == "reviews":
                  count = params.get("process_count")
                  if count and str(count).isdigit():
                      n = int(count)
                      requests = n * 5
                      details = f"{n} facilities * 5 reqs"
                  else:
                      details = "process_count を指定すると見積もりができます（プライベートデータのため行数自動取得不可）"

              elif workflow == "reviews_sequential":
                  rows_per_batch = params.get("rows_per_batch")
                  if rows_per_batch and str(rows_per_batch).isdigit():
                      details = f"1バッチ {rows_per_batch} 行（総行数はプライベートデータのため自動取得不可）"
                  else:
                      details = "rows_per_batch を指定すると見積もりができます"

              elif workflow == "facility":
                  details = "住所CSVはプライベートデータのため行数自動取得不可"

          except Exception as e:
              details = f"Error: {str(e)}"

          cost = requests * 0.0015

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"requests={requests}\n")
              f.write(f"cost={cost:.4f}\n")
              f.write(f"details={details}\n")
          '

      - name: Add preview comment
        if: steps.check.outputs.should_run == 'preview'
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = '${{ steps.parse.outputs.workflow_type }}';
            const requests = '${{ steps.estimate.outputs.requests }}';
            const cost = '${{ steps.estimate.outputs.cost }}';
            const details = '${{ steps.estimate.outputs.details }}';
            
            const workflowNames = {
              'reviews_sequential': '⚡ レビュー取得・新仕様逐次実行',
              'reviews_auto_batch': '🚀 レビュー取得・自動分割',
              'reviews': '📝 レビュー取得',
              'facility': '🏢 施設データ取得'
            };
            
            const body = [
              '## 🔍 ジョブリクエスト受付',
              '',
              `**ワークフロー**: ${workflowNames[workflow] || workflow}`,
              '',
              '### 💰 概算コスト見積もり',
              `- **予想リクエスト数**: ${requests} req`,
              `- **予想コスト**: $${cost} (レート: $1.50/1k req)`,
              `- **内訳**: ${details}`,
              '',
              'ジョブの実行準備が整いました。',
              '',
              '---',
              '',
              '✅ **管理者の方**: 内容を確認後、\\`/承認\\` とコメントして実行を承認してください。',
              '❌ キャンセルする場合は、このIssueをクローズしてください。'
            ].join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Add approval comment
        if: steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          PARAMS_JSON: ${{ steps.parse.outputs.params }}
        with:
          script: |
            const workflow = '${{ steps.parse.outputs.workflow_type }}';
            const params = JSON.parse(process.env.PARAMS_JSON || '{}');
            const workflowNames = {
              'reviews_sequential': '⚡ レビュー取得・新仕様逐次実行',
              'reviews_auto_batch': '🚀 レビュー取得・自動分割',
              'reviews': '📝 レビュー取得',
              'facility': '🏢 施設データ取得'
            };
            
            let details = [];
            if (params.task_name) details.push(`- **タスク名**: \`${params.task_name}\``);
            if (workflow === 'reviews_sequential') {
              if (params.csv_file) details.push(`- **入力CSV**: \`${params.csv_file}\``);
              if (params.output_file) details.push(`- **出力ファイル**: \`${params.output_file}\``);
              if (params.rows_per_batch) details.push(`- **1バッチ行数**: \`${params.rows_per_batch}\``);
              if (params.api_batch_size) details.push(`- **API Batch Size**: \`${params.api_batch_size}\``);
            }
            if (workflow === 'reviews_auto_batch') {
              if (params.batch_size) details.push(`- **バッチサイズ**: \`${params.batch_size}\``);
              if (params.max_parallel_jobs) details.push(`- **最大並列バッチ数**: \`${params.max_parallel_jobs}\``);
            }
            
            // review_fileの取得 (トップレベル or custom_settings内)
            const reviewFile = params.output_file || params.review_file || (params.custom_settings && params.custom_settings.review_file);
            if (reviewFile) details.push(`- **出力ファイル**: \`${reviewFile}\``);
            
            const body = [
              `🚀 **${workflowNames[workflow] || workflow}** の実行を開始します。`,
              '',
              details.length > 0 ? '### ⚙️ 実行パラメータ' : '',
              ...details,
              '',
              '完了までしばらくお待ちください...',
              '',
              `[Actions ログ](${context.payload.repository.html_url}/actions/runs/${context.runId})`
            ].join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  validate-request:
    needs: parse-and-route
    if: needs.parse-and-route.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_execute: ${{ steps.validate.outputs.should_execute }}
      reason: ${{ steps.validate.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout private data
        uses: actions/checkout@v4
        with:
          repository: mememori8888/googlemap
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-data
          sparse-checkout: |
            settings
            results

      - name: Validate request and dependencies
        id: validate
        env:
          WORKFLOW: ${{ needs.parse-and-route.outputs.workflow_type }}
          PARAMS: ${{ needs.parse-and-route.outputs.params }}
        run: |
          python3 - <<'PY'
          import json
          import os

          workflow = os.environ.get("WORKFLOW", "").strip()
          params_raw = os.environ.get("PARAMS", "{}").strip()
          errors = []
          # データファイルはプライベートリポジトリにある
          DATA_ROOT = "private-data"

          if not workflow:
              errors.append("workflow_type が検出できませんでした。Issue本文のコマンドを確認してください。")

          try:
              params = json.loads(params_raw) if params_raw else {}
              if not isinstance(params, dict):
                  errors.append("JSONパラメータはオブジェクト形式で指定してください。")
                  params = {}
          except Exception as e:
              errors.append(f"JSONパラメータの解析に失敗しました: {e}")
              params = {}

          workflow_files = {
              "reviews": ".github/workflows/brightdata_reviews.yml",
              "reviews_auto_batch": ".github/workflows/brightdata_reviews.yml",
              "reviews_sequential": ".github/workflows/reviews_local_interactive_sequential.yml",
          }
          required_scripts = {
              "facility": [".github/scripts/update_config.py", "facility_BrightData_20.py"],
              "reviews_sequential": ["run_reviews_local_interactive.py", "get_reviews_from_dental_new.py"],
          }

          wf_file = workflow_files.get(workflow)
          if wf_file and not os.path.exists(wf_file):
              errors.append(f"必須ワークフローファイルがありません: {wf_file}")

          for script in required_scripts.get(workflow, []):
              if not os.path.exists(script):
                  errors.append(f"必須スクリプトがありません: {script}")

          def data_path(p):
              """相対パスをプライベートリポジトリのパスに変換"""
              if os.path.isabs(p):
                  return p
              return os.path.join(DATA_ROOT, p)

          if workflow == "reviews":
              fid_file = params.get("fid_file")
              if fid_file and not os.path.exists(data_path(fid_file)):
                  errors.append(f"指定された fid_file が存在しません: {fid_file}")

          if workflow == "reviews_auto_batch":
              for key in ["fid_file", "batch_size", "max_parallel_jobs"]:
                  if not params.get(key):
                      errors.append(f"reviews_auto_batch では {key} が必須です。")

          if workflow == "reviews_sequential":
              csv_file = params.get("csv_file")
              output_file = params.get("output_file")

              if not csv_file:
                  errors.append("reviews_sequential では csv_file が必須です。")
              elif not os.path.exists(data_path(csv_file)):
                  errors.append(f"指定された csv_file が存在しません: {csv_file}")

              if not output_file:
                  errors.append("reviews_sequential では output_file が必須です。")

              for key in ["days_back", "start_from_batch", "rows_per_batch", "batch_wait", "api_batch_size", "max_wait_minutes"]:
                  value = params.get(key)
                  if value in (None, ""):
                      errors.append(f"reviews_sequential では {key} が必須です。")
                  else:
                      try:
                          if int(str(value)) < 1:
                              errors.append(f"{key} は1以上の整数を指定してください。")
                      except ValueError:
                          errors.append(f"{key} は整数を指定してください。")

              if not params.get("dataset_id"):
                  errors.append("reviews_sequential では dataset_id が必須です。")
              if not params.get("skip_column"):
                  errors.append("reviews_sequential では skip_column が必須です。")

          should_execute = "true" if not errors else "false"
          reason = "バリデーションOK" if not errors else "\n".join(errors)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_execute={should_execute}\n")
              f.write("reason<<EOF\n")
              f.write(reason + "\n")
              f.write("EOF\n")
          PY

      - name: Comment validation errors
        if: steps.validate.outputs.should_execute != 'true'
        uses: actions/github-script@v7
        env:
          REASON: ${{ steps.validate.outputs.reason }}
          WORKFLOW: ${{ needs.parse-and-route.outputs.workflow_type }}
        with:
          script: |
            const workflow = process.env.WORKFLOW || 'unknown';
            const reason = process.env.REASON || 'Unknown validation error';

            const body = [
              '❌ **実行前バリデーションで停止しました**',
              '',
              `- 対象ワークフロー: ${workflow}`,
              '',
              '### エラー内容',
              reason,
              '',
              'Issue本文の JSON パラメータや必須ファイルを修正後、再度 /承認 を実行してください。'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  run-reviews:
    needs: [parse-and-route, validate-request]
    if: needs.parse-and-route.outputs.should_run == 'true' && needs.validate-request.outputs.should_execute == 'true' && needs.parse-and-route.outputs.workflow_type == 'reviews'
    uses: ./.github/workflows/brightdata_reviews.yml
    secrets: inherit
    with:
      config_file: ${{ fromJson(needs.parse-and-route.outputs.params).config_file }}
      fid_file: ${{ fromJson(needs.parse-and-route.outputs.params).fid_file }}
      task_name: ${{ fromJson(needs.parse-and-route.outputs.params).task_name }}
      start_line: ${{ fromJson(needs.parse-and-route.outputs.params).start_line }}
      process_count: ${{ fromJson(needs.parse-and-route.outputs.params).process_count }}
      review_file: ${{ fromJson(needs.parse-and-route.outputs.params).review_file || fromJson(needs.parse-and-route.outputs.params).custom_settings.review_file }}
      workers: ${{ fromJson(needs.parse-and-route.outputs.params).workers || '10' }}

  run-reviews-auto-batch:
    needs: [parse-and-route, validate-request]
    if: needs.parse-and-route.outputs.should_run == 'true' && needs.validate-request.outputs.should_execute == 'true' && needs.parse-and-route.outputs.workflow_type == 'reviews_auto_batch'
    uses: ./.github/workflows/brightdata_reviews.yml
    secrets: inherit
    with:
      config_file: ${{ fromJson(needs.parse-and-route.outputs.params).config_file || 'settings/settings.json' }}
      fid_file: ${{ fromJson(needs.parse-and-route.outputs.params).fid_file }}
      task_name: ${{ fromJson(needs.parse-and-route.outputs.params).task_name }}
      start_line: ${{ fromJson(needs.parse-and-route.outputs.params).start_line }}
      process_count: ${{ fromJson(needs.parse-and-route.outputs.params).batch_size }}
      review_file: ${{ fromJson(needs.parse-and-route.outputs.params).review_file }}
      workers: ${{ fromJson(needs.parse-and-route.outputs.params).workers || '10' }}

  run-reviews-sequential:
    needs: [parse-and-route, validate-request]
    if: needs.parse-and-route.outputs.should_run == 'true' && needs.validate-request.outputs.should_execute == 'true' && needs.parse-and-route.outputs.workflow_type == 'reviews_sequential'
    uses: ./.github/workflows/reviews_local_interactive_sequential.yml
    secrets: inherit
    with:
      csv_file: ${{ fromJson(needs.parse-and-route.outputs.params).csv_file || 'results/dental_new.csv' }}
      output_file: ${{ fromJson(needs.parse-and-route.outputs.params).output_file || 'results/dental_new_reviews.csv' }}
      merge_to_all_regions: ${{ fromJson(needs.parse-and-route.outputs.params).merge_to_all_regions != false }}
      all_regions_file: ${{ fromJson(needs.parse-and-route.outputs.params).all_regions_file || 'results/dental_new_reviews_all_regions.csv' }}
      days_back: ${{ fromJson(needs.parse-and-route.outputs.params).days_back || '10' }}
      start_from_batch: ${{ fromJson(needs.parse-and-route.outputs.params).start_from_batch || '1' }}
      rows_per_batch: ${{ fromJson(needs.parse-and-route.outputs.params).rows_per_batch || '500' }}
      batch_wait: ${{ fromJson(needs.parse-and-route.outputs.params).batch_wait || '120' }}
      api_batch_size: ${{ fromJson(needs.parse-and-route.outputs.params).api_batch_size || '50' }}
      max_wait_minutes: ${{ fromJson(needs.parse-and-route.outputs.params).max_wait_minutes || '90' }}
      dataset_id: ${{ fromJson(needs.parse-and-route.outputs.params).dataset_id || 'gd_luzfs1dn2oa0teb81' }}
      skip_column: ${{ fromJson(needs.parse-and-route.outputs.params).skip_column || 'web' }}
      generate_report: ${{ fromJson(needs.parse-and-route.outputs.params).generate_report != false }}
      report_days: ${{ fromJson(needs.parse-and-route.outputs.params).report_days || '10' }}


  run-facility:
    needs: [parse-and-route, validate-request]
    if: needs.parse-and-route.outputs.should_run == 'true' && needs.validate-request.outputs.should_execute == 'true' && needs.parse-and-route.outputs.workflow_type == 'facility'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout private data
        uses: actions/checkout@v4
        with:
          repository: mememori8888/googlemap
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-data

      - name: Copy private data to workspace
        run: |
          cp -r private-data/settings ./settings
          cp -r private-data/results ./results
          echo "✅ settings/ と results/ をコピーしました"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Apply custom settings
        id: settings
        env:
          PARAMS: ${{ needs.parse-and-route.outputs.params }}
        run: |
          echo "Extracting parameters..."
          export CONFIG_FILE=$(echo "$PARAMS" | jq -r '.config_file // "settings/settings.json"')
          export CUSTOM_SETTINGS=$(echo "$PARAMS" | jq -c '.custom_settings // null')
          
          echo "CONFIG_FILE: $CONFIG_FILE"
          echo "CUSTOM_SETTINGS: $CUSTOM_SETTINGS"
          echo "config_file=$CONFIG_FILE" >> $GITHUB_OUTPUT
          
          python .github/scripts/update_config.py
      
      - name: Run facility scraper
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          MAX_WORKERS: "10"
          IO_MULTIPLIER: "3"
          CONFIG_FILE: ${{ steps.settings.outputs.config_file }}
        run: |
          echo "Using CONFIG_FILE: $CONFIG_FILE"
          python faiility_brightdata_new_version.py
      
      - name: Save results to private repository
        run: |
          echo "💾 結果をプライベートリポジトリに保存中..."
          cp -r results/. private-data/results/ 2>/dev/null || true
          cp -r settings/. private-data/settings/ 2>/dev/null || true

          cd private-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add results/ settings/
          if git diff --staged --quiet; then
            echo "ℹ️ プライベートリポジトリに変更なし"
          else
            git commit -m "Update facility data - $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
            echo "✅ プライベートリポジトリに保存しました"
          fi

  report-completion:
    needs: [parse-and-route, validate-request, run-reviews, run-reviews-sequential, run-reviews-auto-batch, run-facility]
    runs-on: ubuntu-latest
    if: always() && needs.parse-and-route.outputs.should_run == 'true' && needs.validate-request.outputs.should_execute == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Report result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const jobs = {
              'reviews_auto_batch': '${{ needs.run-reviews-auto-batch.result }}',
              'reviews_sequential': '${{ needs.run-reviews-sequential.result }}',
              'reviews': '${{ needs.run-reviews.result }}',
              'facility': '${{ needs.run-facility.result }}'
            };
            
            const workflow = '${{ needs.parse-and-route.outputs.workflow_type }}';
            const result = jobs[workflow];
            const shouldRun = '${{ needs.parse-and-route.outputs.should_run }}';
            const shouldExecute = '${{ needs.validate-request.outputs.should_execute }}';
            const validationReason = `${{ needs.validate-request.outputs.reason }}`;
            
            const privateRepoUrl = 'https://github.com/mememori8888/googlemap';
            const artifactUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}#artifacts`;
            
            // Issueから解析されたパラメータを取得
            let params = {};
            try {
              const paramsJson = `${{ needs.parse-and-route.outputs.params }}`;
              params = JSON.parse(paramsJson);
            } catch (error) {
              console.log('パラメータ解析エラー:', error.message);
            }
            
            let body = '';
            if (result === 'success') {
              // 出力ファイルのリストを作成（ワークフロータイプに応じて表示）
              const files = [];
              
              if (workflow === 'facility') {
                const facilityFile = params.custom_facility_file;
                if (facilityFile) {
                  files.push(`- 📍 **施設ファイル**: \`${facilityFile}\`（プライベートリポジトリ）`);
                  const facilityName = path.basename(facilityFile, '.csv');
                  files.push(`- 🔑 **FIDファイル**: \`results/${facilityName}_fid.csv\`（プライベートリポジトリ）`);
                }
              } else if (workflow === 'reviews' || workflow === 'reviews_auto_batch' || workflow === 'reviews_sequential') {
                const reviewFile = params.output_file || params.review_file || params.custom_review_file;
                if (reviewFile) {
                  files.push(`- ⭐ **レビューファイル**: \`${reviewFile}\`（プライベートリポジトリ）`);
                }
                const inputFile = params.csv_file || params.fid_file;
                if (inputFile) {
                  files.push(`- 📥 **入力ファイル**: \`${inputFile}\`（プライベートリポジトリ）`);
                }
              }
              
              const fileList = files.length > 0 ? `\n\n### 📊 出力ファイル\n${files.join('\n')}` : '';
              
              body = `✅ **ジョブ完了**${fileList}\n\n` +
                     `### 📦 データの確認\n` +
                     `- [📁 プライベートリポジトリ results/ を見る](${privateRepoUrl}/tree/main/results)\n` +
                     `- [📦 Artifactsをダウンロード](${artifactUrl})\n` +
                     `- [📊 Actionsログを見る](${context.payload.repository.html_url}/actions/runs/${context.runId})`;
              
              // Issueをクローズ
              github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });
            } else if (result === 'cancelled') {
              const reasons = [];
              reasons.push(`- workflow_type: \`${workflow || 'unknown'}\``);
              reasons.push(`- should_run: \`${shouldRun || 'unknown'}\``);
              reasons.push(`- should_execute: \`${shouldExecute || 'unknown'}\``);

              if (validationReason && validationReason !== 'バリデーションOK') {
                reasons.push(`- バリデーション詳細:\n\`\`\`\n${validationReason}\n\`\`\``);
              }

              body = `⚠️ **ジョブはキャンセルされました**\n\n` +
                     `- 実行結果: \`${result}\`\n` +
                     `\n### 🔎 判定情報\n${reasons.join('\n')}\n` +
                     `- [Actionsログを見る](${context.payload.repository.html_url}/actions/runs/${context.runId})`;
            } else if (result === 'skipped') {
              const reasons = [];
              reasons.push(`- workflow_type: \`${workflow || 'unknown'}\``);
              reasons.push(`- should_run: \`${shouldRun || 'unknown'}\``);
              reasons.push(`- should_execute: \`${shouldExecute || 'unknown'}\``);

              if (validationReason && validationReason !== 'バリデーションOK') {
                reasons.push(`- バリデーション詳細:\n\`\`\`\n${validationReason}\n\`\`\``);
              }

              body = `ℹ️ **ジョブはスキップされました**\n\n` +
                     `- 実行結果: \`${result}\`\n` +
                     `- Issue本文のコマンド/パラメータを確認してください\n` +
                     `\n### 🔎 判定情報\n${reasons.join('\n')}\n` +
                     `- [Actionsログを見る](${context.payload.repository.html_url}/actions/runs/${context.runId})`;
            } else {
              body = `❌ **ジョブ失敗**\n\n` +
                     `- 実行結果: \`${result || 'unknown'}\`\n` +
                     `エラー詳細は [Actions](${context.payload.repository.html_url}/actions/runs/${context.runId}) を確認してください。`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
